<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard - Danh mục</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
<div class="logo">Shop Tuấn Emm</div>

<a href="danhmuc.html">📂 Quản lý danh mục</a>
<a href="sanpham.html">📦 Quản lý sản phẩm</a>

</div>

<div class="header">

<h3>Hệ thống quản lý</h3>

<div class="avatar">
<img src="avatar.jpg">
<span>Tuấn Chủ Shop</span>
</div>

</div>

<div class="content">

<div class="cards">

<div class="card">
<h3>Tổng danh mục</h3>
<p>5</p>
</div>

<div class="card">
<h3>Sản phẩm</h3>
<p>25</p>
</div>

<div class="card">
<h3>Người dùng</h3>
<p>3</p>
</div>

</div>

<div class="container">

<h2>Quản lý danh mục</h2>

<form>

<div class="form-group">
<label>Mã danh mục</label>
<input type="text">
</div>

<div class="form-group">
<label>Tên danh mục</label>
<input type="text">
</div>

<div class="form-group">
<label>Mô tả</label>
<textarea rows="3"></textarea>
</div>

<div class="form-group">
<label>Trạng thái</label>
<select>
<option>Hoạt động</option>
<option>Tạm khóa</option>
</select>
</div>

<button class="save">Lưu</button>
<button class="delete">Xóa</button>

</form>

<table>

<tr>
<th>Mã</th>
<th>Tên danh mục</th>
<th>Trạng thái</th>
</tr>

<tr>
<td>DM01</td>
<td>Điện thoại</td>
<td>Hoạt động</td>
</tr>

<tr>
<td>DM02</td>
<td>Laptop</td>
<td>Hoạt động</td>
</tr>

</table>

</div>

</div>

</body>
</html>
